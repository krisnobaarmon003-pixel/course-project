<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account</title>
    <link rel="stylesheet" href="/LoginPg/Login Page/signup.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="/css/bootstrap.min.css">
</head>
<body>
    
    <div class="signup-container">
        <form class="signup-form">
            <h2>Create Account</h2>
            <p>Create Your own Account and Enjoy the Services.</p>
            
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="input1" placeholder="Enter your username" required>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="input1" placeholder="krisno1.3g@example.com" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="input1" placeholder="At least 8 characters" required>
                <br><br>
                <label for="confrompass">Re-Enter Your Password</label>
                <input type="password" id="password" class="input1" placeholder="Re-Enter Password" required>
            </div>

            <button type="submit" class="signup-btn">Sign Up</button>
            
            <p class="footer-text">
                Already have an account? <a href="/LoginPg/Login Page/Loginpage.html">Login here</a>
            </p>
        </form>  
    </div>
    <script src="/js/bootstrap.bundle.min.js"></script>
</body>
</html>
